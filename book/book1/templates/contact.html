<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact Me</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #35424a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .contact-form { background: white; padding: 30px; border-radius: 8px; box-shadow: 0px 4px 15px rgba(0,0,0,0.3); width: 400px; }
        h2 { text-align: center; color: #35424a; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; background: #e8491d; color: white; border: none; padding: 12px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #cf3d16; }
        .back-link { display: block; text-align: center; margin-top: 15px; color: #35424a; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

    <div class="contact-form">
        <h2>Get In Touch</h2>
        <form action="#" method="POST">
            <div class="form-group">
                <label>Name</label>
                <input type="text" name="name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea name="message" rows="4" placeholder="Your message here..." required></textarea>
            </div>
            <button type="submit">Send Message</button>
        </form>
        <a href="http://127.0.0.1:8000/book/portfolio/" class="back-link">← Back to Portfolio</a>
    </div>

</body>
</html>
